<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Homefront Markets — Marketplace Coming Soon</title>
<meta name="description" content="Homefront Markets: a marketplace for American-made goods. Coming soon. Join the newsletter in the meantime.">
<!-- PLACEHOLDER PAGE — replace with your own coming-soon design. Keep the file name index.html. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#922B3E; --red-dark:#7A2333;
    --ink:#1A1A1A; --cream:#FAF8F5; --warm:#4A3728; --muted:#6B5E54; --divider:#E0DBD5;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  body{
    font-family:'Inter',sans-serif; background:var(--cream); color:var(--ink);
    border-top:5px solid var(--red);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background-image:radial-gradient(120% 80% at 50% -10%, rgba(146,43,62,0.06), transparent 60%);
    text-align:center; padding:24px;
  }
  main{max-width:560px}
  img.logo{width:260px; height:auto; margin-bottom:28px}
  h1{font-weight:800; font-size:clamp(28px,5vw,42px); letter-spacing:-0.025em; margin-bottom:14px}
  h1 em{font-style:normal; color:var(--red)}
  p.sub{font-family:'Lora',serif; font-style:italic; color:var(--warm); line-height:1.6; margin-bottom:28px}
  a.cta{
    display:inline-block; background:var(--red); color:#fff; text-decoration:none;
    font-weight:700; font-size:15px; padding:14px 28px; border-radius:30px;
    transition:background .15s ease, transform .12s ease;
  }
  a.cta:hover{background:var(--red-dark); transform:translateY(-2px)}
  a.cta-secondary{
    display:inline-block; margin-top:14px; background:transparent; color:var(--red);
    text-decoration:none; font-weight:700; font-size:13.5px; padding:10px 22px;
    border:1.5px solid var(--red); border-radius:30px;
    transition:background .15s ease, color .15s ease;
  }
  a.cta-secondary:hover{background:var(--red); color:#fff}
  p.fine{font-size:12.5px; color:var(--muted); margin-top:20px}
</style>
</head>
<body>
<main>
  <img class="logo" src="assets/hfm-logo.png" alt="Homefront Markets">
  <h1>The marketplace is <em>under construction</em>.</h1>
  <p class="sub">A home for American-made goods is on the way. Until the doors open, our newsletter is where the story starts.</p>
  <a class="cta" href="https://newsletter.homefrontmarkets.com">Join the Newsletter →</a>
  <br>
  <a class="cta-secondary" href="/archive/">Browse the Archive →</a>
  <p class="fine">Homefront Markets · Marketplace coming soon</p>
</main>
</body>
</html>
